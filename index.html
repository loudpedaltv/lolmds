<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Race Lineup Graphic Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/xvv2lut.css">
<style>
  /* ---- Brand fonts (FloSports) ----
     Drop the licensed web font files into assets/fonts/ with these exact
     names and they load automatically. Until then the stack falls back to
     Inter / system per DESIGN.md. Indivisible = marquee titles, Uni Neue =
     everything else. */
  @font-face {
    font-family: 'Uni Neue';
    src: url('assets/fonts/Fontfabric - UniNeueBold.ttf') format('truetype');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Uni Neue';
    src: url('assets/fonts/Fontfabric - UniNeueRegular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Uni Neue';
    src: url('assets/fonts/Fontfabric - UniNeueHeavy-Italic.ttf') format('truetype');
    font-weight: 900; font-style: italic; font-display: swap;
  }
  /* Indivisible (Black 900) is served by Adobe Fonts via the Typekit
     <link> in <head> under the family name "indivisible". */

  :root {
    /* FloSports palette — DESIGN.md */
    --ignite-red: #FF140F;     /* master accent, on dark surfaces */
    --flo-black: #121212;      /* foundation surface */
    --cool-grey: #939396;      /* borders, dividers, metadata */
    --dark-grey: #222222;
    --font-display: 'indivisible', 'Uni Neue', Inter, "Helvetica Neue", Arial, sans-serif;
    --font-body: 'Uni Neue', Inter, "Helvetica Neue", Arial, sans-serif;
    font-family: var(--font-body);
  }
  body { margin: 0; background: #f0f1f3; color: #1a1a1a; }

  .app { display: flex; min-height: 100vh; }

  /* ---- Controls panel ---- */
  .panel {
    width: 360px;
    flex-shrink: 0;
    background: #fff;
    padding: 24px;
    box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    overflow-y: auto;
  }
  .panel h1 { font-size: 18px; margin: 0 0 4px; }
  .panel p.hint { font-size: 12px; color: #777; margin: 0 0 20px; }
  .panel label { display: block; font-size: 12px; font-weight: 600; margin: 16px 0 6px; color: #444; }
  .panel input[type="file"],
  .panel input[type="text"],
  .panel input[type="number"],
  .panel select {
    width: 100%; padding: 8px; box-sizing: border-box;
    border: 1px solid #ccc; border-radius: 2px; font-size: 13px;
    background: #fff; font-family: inherit;
  }
  .dims { display: flex; gap: 8px; }
  .dims > div { flex: 1; }
  .panel button {
    width: 100%; margin-top: 20px; padding: 10px;
    background: #ED2925; color: #fff; border: none; border-radius: 4px;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .panel button:hover { background: #c61f1c; }
  .panel button.secondary { background: #fff; color: #ED2925; border: 1px solid #ED2925; }
  .panel button.secondary:hover { background: #fdeaec; }
  .sample-link { font-size: 12px; color: #ED2925; cursor: pointer; text-decoration: underline; }
  .section-divider { border-top: 1px solid #eee; margin: 20px 0 0; }

  /* ---- Preview area ---- */
  .preview-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px;
    overflow: auto;
  }
  #stage-scaler { box-shadow: 0 4px 20px rgba(0,0,0,0.35); }

  /* ---- The exported graphic itself ---- */
  #graphic {
    position: relative;
    background-color: var(--flo-black);
    background-size: cover;
    background-position: center;
    overflow: hidden;
    font-family: var(--font-body);
    color: #fff;
  }
  #graphic .bg-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }
  #graphic .scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.55) 30%, rgba(0,0,0,0.72) 100%);
    z-index: 1;
  }
  #graphic .content-layer {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  #graphic .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 40px 10px;
  }
  #graphic .logos { display: flex; align-items: center; gap: 22px; flex-shrink: 0; }
  #graphic .logos img { height: 118px; object-fit: contain; }
  #graphic .title-block { text-align: right; flex: 1; min-width: 0; padding-left: 24px; }
  #graphic .title-block h2 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 54px;
    white-space: nowrap;
    font-weight: 900;
    font-style: italic;
    letter-spacing: -0.01em;
    color: #fff;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.55);
  }
  #graphic .title-block .sub {
    font-size: 24px;
    font-weight: 900;
    font-style: italic;
    color: var(--ignite-red);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-top: 4px;
  }

  /* 10deg forward-lean accent (Flo momentum motif), Ignite Red */
  #graphic .accent-bar {
    height: 6px;
    width: 220px;
    background: var(--ignite-red);
    margin: 6px 40px 18px;
    transform: skewX(-10deg);
  }

  #graphic .rows {
    flex: 1;
    padding: 0 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 0.45em;
    overflow: hidden;
    text-align: left;
  }
  #graphic .row-line {
    font-size: 21px;
    font-weight: 700;
    line-height: 1.25;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.7);
    text-align: left;
    width: 100%;
    white-space: nowrap;
  }
  #graphic .row-line .row-label {
    color: var(--ignite-red);
    font-weight: 900;
    font-style: italic;
    margin-right: 6px;
  }
  #graphic .row-line .competitor-name { color: #fff; }
  #graphic .row-line .sep { color: var(--cool-grey); margin: 0 6px; }

  #graphic .footer-info {
    padding: 14px 44px 24px;
    border-top: 1px solid rgba(147,147,150,0.45);  /* Cool Grey @ 45% */
    margin: 12px 44px 0;
    padding-left: 0;
    padding-right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #graphic .footer-info .label {
    font-style: italic;
    font-weight: 900;
    text-transform: uppercase;
    font-size: 18px;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    color: #fff;
  }
  #graphic .footer-info .line {
    font-size: 16px;
    font-weight: 400;
    color: var(--cool-grey);
    margin-bottom: 3px;
  }
  #graphic .footer-info .line b { color: #fff; }

  #graphic .live-on-logo {
    height: 80px;
    object-fit: contain;
    flex-shrink: 0;
    margin-left: 24px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="panel">
    <h1>Race Lineup Graphic</h1>
    <p class="hint">Upload a workbook, pick a race, export a PNG.</p>

    <label>Race title</label>
    <input type="text" id="raceTitle" value="RACE TITLE">

    <label>Subtitle (laps / type)</label>
    <input type="text" id="raceSubtitle" value="X Laps | Starting Lineup">

    <label>Lineup workbook (.xlsx)</label>
    <input type="file" id="xlsxInput" accept=".xlsx">

    <div id="raceSelectWrap" style="display:none;">
      <label>Race</label>
      <select id="raceSelect"></select>
    </div>

    <div class="section-divider"></div>

    <label>Background image</label>
    <input type="file" id="bgInput" accept="image/*">

    <label>Series logo (top left)</label>
    <input type="file" id="seriesLogoInput" accept="image/*">
    <div style="margin-top:6px;"><span class="sample-link" id="clearSeriesLogo">Clear series logo</span></div>

    <label>Sponsor logo (top left, next to series)</label>
    <input type="file" id="sponsorLogoInput" accept="image/*">
    <div style="margin-top:6px;"><span class="sample-link" id="clearSponsorLogo">Clear sponsor logo</span></div>

    <div class="section-divider"></div>

    <label>Footer stat lines (one per line, optional)</label>
    <input type="text" id="footerLine1" value="Sample Data">
    <div style="height:6px;"></div>
    <input type="text" id="footerLine2" value="Sample Data">

    <label>Export dimensions</label>
    <select id="exportDims">
      <option value="1080x1080" selected>1080 x 1080 (Square)</option>
      <option value="1080x1350">1080 x 1350 (Portrait)</option>
    </select>

    <button id="renderBtn">Render Graphic</button>
    <button id="downloadBtn" class="secondary">Download PNG</button>
  </div>

  <div class="preview-wrap">
    <div id="stage-scaler">
      <div id="graphic">
        <div class="bg-img" id="bgImg" style="background-image: url('assets/background.jpg?v=2');"></div>
        <div class="scrim"></div>
        <div class="content-layer">
          <div class="header">
            <div class="logos">
              <img id="seriesLogoImg" src="assets/series-logo.png">
              <img id="sponsorLogoImg" src="" style="display:none;">
            </div>
            <div class="title-block">
              <h2 id="titleDisplay">RACE TITLE</h2>
              <div class="sub" id="subtitleDisplay">X Laps | Starting Lineup</div>
            </div>
          </div>
          <div class="accent-bar"></div>
          <div class="rows" id="rowsBody"></div>
          <div class="footer-info" id="footerInfo">
            <div class="footer-text">
              <div class="label">Tonight at a Glance</div>
              <div class="line" id="footerLine1Display"></div>
              <div class="line" id="footerLine2Display"></div>
            </div>
            <img class="live-on-logo" src="assets/live-on-floracing.png">
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const SAMPLE_CSV = `start,number,competitor
1,00,First Name Last Name
2,00,First Name Last Name
3,00,First Name Last Name
4,00,First Name Last Name
5,00,First Name Last Name
6,00,First Name Last Name
7,00,First Name Last Name
8,00,First Name Last Name
9,00,First Name Last Name
10,00,First Name Last Name
11,00,First Name Last Name
12,00,First Name Last Name
13,00,First Name Last Name
14,00,First Name Last Name
15,00,First Name Last Name
16,00,First Name Last Name
17,00,First Name Last Name
18,00,First Name Last Name
19,00,First Name Last Name`;

let currentData = [];

function parseCSVText(text) {
  const result = Papa.parse(text, { header: true, skipEmptyLines: true });
  currentData = result.data.map(r => ({
    start: (r.start || '').trim(),
    number: (r.number || '').trim(),
    competitor: (r.competitor || '').trim(),
  }));
  renderGraphic();
}

// Workbook rows grouped by Race, preserving each row's position within
// its group as the starting order (no explicit "start" column needed).
let racesFromWorkbook = {};

document.getElementById('xlsxInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    const workbook = XLSX.read(evt.target.result, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

    racesFromWorkbook = {};
    rows.forEach(row => {
      const raceName = String(row['Race'] || '').trim();
      if (!raceName) return;
      if (!racesFromWorkbook[raceName]) racesFromWorkbook[raceName] = [];
      racesFromWorkbook[raceName].push({
        number: String(row['#'] || '').trim(),
        competitor: `${String(row['First Name'] || '').trim()} ${String(row['Last Name'] || '').trim()}`.trim(),
      });
    });

    const raceSelect = document.getElementById('raceSelect');
    raceSelect.innerHTML = '';
    Object.keys(racesFromWorkbook).forEach(raceName => {
      const opt = document.createElement('option');
      opt.value = raceName;
      opt.textContent = raceName;
      raceSelect.appendChild(opt);
    });
    document.getElementById('raceSelectWrap').style.display = 'block';

    loadRaceFromWorkbook(raceSelect.value);
  };
  reader.readAsArrayBuffer(file);
});

document.getElementById('raceSelect').addEventListener('change', (e) => {
  loadRaceFromWorkbook(e.target.value);
});

// Auto-match a sponsor logo from keywords found in the race name.
// Add new races/logos here as files are built out — keys are matched
// case-insensitively against the race name, first match wins.
const SPONSOR_LOGO_MAP = {
  'non-qualifier': 'assets/sponsor-logo.png',
  'msm': 'assets/sponsor-logo.png',
  'fast shafts': 'assets/sponsors/fast-shafts.png',
  'unoh': 'assets/sponsors/unoh.png',
  'penske shocks': 'assets/sponsors/penske-shocks.png',
  'summit racing': 'assets/sponsors/summit-racing.png',
  'simpson race products': 'assets/sponsors/simpson.png',
  'myracepass': 'assets/sponsors/myracepass.png',
  'cool-it thermo tec': 'assets/sponsors/cool-it.png',
};

function applySponsorLogoForRace(raceName) {
  const lower = raceName.toLowerCase();
  const matchKey = Object.keys(SPONSOR_LOGO_MAP).find(key => lower.includes(key));
  const sponsorImg = document.getElementById('sponsorLogoImg');
  if (matchKey) {
    sponsorImg.onerror = () => { sponsorImg.style.display = 'none'; };
    sponsorImg.style.display = '';
    sponsorImg.src = SPONSOR_LOGO_MAP[matchKey];
  } else {
    sponsorImg.style.display = 'none';
  }
}

function loadRaceFromWorkbook(raceName) {
  const entries = racesFromWorkbook[raceName];
  if (!entries) return;
  currentData = entries.map((entry, i) => ({
    start: String(i + 1),
    number: entry.number,
    competitor: entry.competitor,
  }));
  document.getElementById('raceTitle').value = raceName;
  applySponsorLogoForRace(raceName);
  renderGraphic();
}

function setupImageInput(inputId, targetImgId) {
  document.getElementById(inputId).addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      const img = document.getElementById(targetImgId);
      img.style.display = '';   // a manual upload always overrides any auto-hide
      // logo width (and thus the title's available space) is only known once
      // the new image has actually loaded, so re-fit on load.
      img.onload = renderGraphic;
      img.src = evt.target.result;
    };
    reader.readAsDataURL(file);
  });
}
setupImageInput('seriesLogoInput', 'seriesLogoImg');
setupImageInput('sponsorLogoInput', 'sponsorLogoImg');

function setupClearLogo(buttonId, targetImgId, inputId) {
  document.getElementById(buttonId).addEventListener('click', () => {
    const img = document.getElementById(targetImgId);
    img.src = '';
    img.style.display = 'none';
    document.getElementById(inputId).value = '';  // reset the file picker
    renderGraphic();
  });
}
setupClearLogo('clearSeriesLogo', 'seriesLogoImg', 'seriesLogoInput');
setupClearLogo('clearSponsorLogo', 'sponsorLogoImg', 'sponsorLogoInput');

document.getElementById('bgInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    grayscaleImageDataUrl(evt.target.result, (processedDataUrl) => {
      document.getElementById('bgImg').style.backgroundImage = `url('${processedDataUrl}')`;
    });
  };
  reader.readAsDataURL(file);
});

// Any uploaded background gets converted to actual grayscale pixels here,
// because html2canvas does not reliably honor the CSS `filter` property
// at export time (it would look right in the live preview but not in the PNG).
function grayscaleImageDataUrl(dataUrl, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
      data[i] = data[i + 1] = data[i + 2] = gray;
    }
    ctx.putImageData(imageData, 0, 0);
    callback(canvas.toDataURL('image/jpeg', 0.92));
  };
  img.src = dataUrl;
}

function renderGraphic() {
  document.getElementById('titleDisplay').textContent = document.getElementById('raceTitle').value;
  document.getElementById('subtitleDisplay').textContent = document.getElementById('raceSubtitle').value;
  document.getElementById('footerLine1Display').innerHTML = document.getElementById('footerLine1').value;
  document.getElementById('footerLine2Display').innerHTML = document.getElementById('footerLine2').value;

  const [dimsW, dimsH] = document.getElementById('exportDims').value.split('x');
  const w = parseInt(dimsW, 10) || 1080;
  const h = parseInt(dimsH, 10) || 1350;
  const graphic = document.getElementById('graphic');
  graphic.style.width = w + 'px';
  graphic.style.height = h + 'px';

  const rowsBody = document.getElementById('rowsBody');
  rowsBody.innerHTML = '';
  const rowCount = Math.ceil(currentData.length / 2);
  for (let i = 0; i < rowCount; i++) {
    const a = currentData[i * 2];
    const b = currentData[i * 2 + 1];
    const div = document.createElement('div');
    div.className = 'row-line';
    let html = `<span class="row-label">ROW ${i + 1}:</span>`;
    html += `<span class="competitor-name">${a.number} ${a.competitor}</span>`;
    if (b) {
      html += `<span class="sep">|</span><span class="competitor-name">${b.number} ${b.competitor}</span>`;
    }
    div.innerHTML = html;
    rowsBody.appendChild(div);
  }

  fitTitleText();
  fitRowsText();
}

// Shrink the race title so it never overruns the space left of it by the
// logos. title-block is flex:remaining-width with min-width:0, so its own
// clientWidth is exactly the room available next to the (non-shrinking) logos.
function fitTitleText() {
  const title = document.getElementById('titleDisplay');
  const block = document.querySelector('#graphic .title-block');
  if (!title || !block) return;

  const maxFont = 54;
  const minFont = 22;
  const available = block.clientWidth - parseFloat(getComputedStyle(block).paddingLeft);

  let fontSize = maxFont;
  title.style.fontSize = fontSize + 'px';
  while (title.scrollWidth > available && fontSize > minFont) {
    fontSize -= 1;
    title.style.fontSize = fontSize + 'px';
  }
}

function fitRowsText() {
  const rowsBody = document.getElementById('rowsBody');
  const lines = rowsBody.querySelectorAll('.row-line');
  if (!lines.length) return;

  // lines have width:100%, sized against rowsBody's content box (after
  // its own padding), independent of font-size — safe to read once.
  const availableWidth = lines[0].clientWidth;
  const availableHeight = rowsBody.clientHeight;
  const gapEm = 0.45;
  const lineHeight = 1.25;

  let fontSize = 70;
  const minFontSize = 14;

  while (fontSize > minFontSize) {
    const lineBlockHeight = fontSize * lineHeight;
    const gapPx = fontSize * gapEm;
    const totalHeight = lines.length * lineBlockHeight + (lines.length - 1) * gapPx;

    lines.forEach(el => { el.style.fontSize = fontSize + 'px'; });
    let widestLine = 0;
    lines.forEach(el => { widestLine = Math.max(widestLine, el.scrollWidth); });

    if (totalHeight <= availableHeight && widestLine <= availableWidth) break;
    fontSize -= 1;
  }

  lines.forEach(el => { el.style.fontSize = fontSize + 'px'; });
}

document.getElementById('renderBtn').addEventListener('click', renderGraphic);
document.getElementById('exportDims').addEventListener('change', renderGraphic);

// Live-update the graphic as any text field is edited.
['raceTitle', 'raceSubtitle', 'footerLine1', 'footerLine2'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderGraphic);
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const graphic = document.getElementById('graphic');
  html2canvas(graphic, {
    width: graphic.offsetWidth,
    height: graphic.offsetHeight,
    scale: 1,
    useCORS: true,
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = (document.getElementById('raceTitle').value || 'race-graphic').replace(/\s+/g, '_') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
});

parseCSVText(SAMPLE_CSV);
</script>
</body>
</html>
